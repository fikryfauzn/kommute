<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kommute</title>
  <link rel="stylesheet" href="/css/style.css?v=2">
</head>
<body>
  <header>
    <h1>kommute</h1>
    <p class="subtitle">KRL Jabodetabek</p>
  </header>

  <main>
    <section id="picker">
      <input type="text" id="search" placeholder="search station" autocomplete="off" autocorrect="off" spellcheck="false">
      <div id="recents"></div>
      <div id="results"></div>
    </section>

    <section id="board" hidden>
      <div id="board-header">
        <button id="back-btn" aria-label="Back">&#8592;</button>
        <h2 id="station-name"></h2>
      </div>
      <div id="arrivals"></div>
    </section>
  </main>

  <script src="/js/app.js?v=2"></script>
</body>
</html>
